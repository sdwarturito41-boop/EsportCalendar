name: Sync teams players (Pandascore /teams -> Supabase)

on:
  workflow_run:
    workflows: ["Sync matches (Pandascore -> Supabase)"]
    types: [completed]
  workflow_dispatch:

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EsportApp/package-lock.json

      - name: Install deps
        working-directory: EsportApp
        run: npm ci --no-audit --no-fund

      - name: Run teams sync
        working-directory: EsportApp
        env:
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync_teams.js
