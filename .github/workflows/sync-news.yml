name: Sync news (GNews -> Supabase)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EsportApp/package-lock.json

      - name: Install deps
        working-directory: EsportApp
        run: npm ci --no-audit --no-fund

      - name: Run news sync
        working-directory: EsportApp
        env:
          GNEWS_TOKEN: ${{ secrets.GNEWS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync_news.js
